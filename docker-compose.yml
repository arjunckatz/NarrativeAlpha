services:
  postgres:
    image: postgres:16
    container_name: narrative-alpha-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-narrative_alpha}
      POSTGRES_USER: ${POSTGRES_USER:-narrative_alpha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-narrative_alpha}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-narrative_alpha} -d ${POSTGRES_DB:-narrative_alpha}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
